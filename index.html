//for loop with p tag of 00:00 and set interval every 1 second replace inner html with next one like 00:01
//https://www.w3schools.com/jsref/met_win_setinterval.asp used this for setInterval
var timeID
displaytime=0
function timeincrem(){
   displaytime++
   document.getElementById("showtime").innerHTML=displaytime
   

}

document.getElementById("startTimer").onclick=function(){
 timeID=setInterval(timeincrem,1000)}
document.getElementById('stopTimer').onclick=function(){clearInterval(timeID)
timeID=undefined}
document.getElementById('resetTimer').onclick=function(){displaytime=0;document.getElementById("showtime").innerHTML=displaytime;clearInterval(timeID);
timeID=undefined}
</script>
